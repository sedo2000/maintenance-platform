<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>بروفايل مقدم الخدمة</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="css/style.css" />
</head>
<body class="bg-gray-50 text-gray-800">

<header class="bg-white shadow-sm">
  <div class="max-w-4xl mx-auto px-4 py-3">
    <a href="index.html" class="text-blue-600 font-bold">← عودة للرئيسية</a>
  </div>
</header>

<main class="max-w-4xl mx-auto px-4 py-8">
  <div id="providerContent" class="bg-white rounded-xl shadow-sm p-6 mb-8">
    <p class="text-gray-400">جاري تحميل البيانات...</p>
  </div>

  <!-- صور الأعمال السابقة -->
  <div id="gallery" class="grid grid-cols-2 md:grid-cols-4 gap-3 mb-8"></div>

  <!-- قسم التقييمات -->
  <section>
    <h3 class="text-lg font-bold mb-4">التقييمات والمراجعات</h3>

    <form id="reviewForm" class="bg-white rounded-xl p-4 shadow-sm mb-6 flex flex-col gap-3">
      <div class="flex gap-1 text-2xl" id="starPicker">
        <span data-value="1" class="cursor-pointer text-gray-300">★</span>
        <span data-value="2" class="cursor-pointer text-gray-300">★</span>
        <span data-value="3" class="cursor-pointer text-gray-300">★</span>
        <span data-value="4" class="cursor-pointer text-gray-300">★</span>
        <span data-value="5" class="cursor-pointer text-gray-300">★</span>
      </div>
      <textarea id="commentInput" placeholder="اكتب رأيك في الخدمة..."
        class="border rounded-lg px-3 py-2 text-sm" rows="3"></textarea>
      <button type="submit" class="bg-blue-600 text-white rounded-lg px-4 py-2 w-fit hover:bg-blue-700">
        إرسال التقييم
      </button>
    </form>

    <div id="reviewsList" class="flex flex-col gap-3"></div>
  </section>
</main>

<script src="js/provider.js"></script>
</body>
</html>
