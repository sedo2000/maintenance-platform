<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>فني قريب | صيانة ومهن منزلية بالقرب منك</title>

<!-- Tailwind CSS عبر CDN لتسريع التطوير -->
<script src="https://cdn.tailwindcss.com"></script>
<!-- Leaflet.js لعرض الخريطة (مجاني، يعتمد على OpenStreetMap) -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<link rel="stylesheet" href="css/style.css" />
</head>
<body class="bg-gray-50 text-gray-800 font-sans">

<!-- الهيدر -->
<header class="bg-white shadow-sm sticky top-0 z-50">
  <div class="max-w-6xl mx-auto flex items-center justify-between px-4 py-3">
    <h1 class="text-xl font-bold text-blue-600">🔧 فني قريب</h1>
    <nav class="flex gap-3 text-sm">
      <a href="dashboard.html" class="px-3 py-2 rounded-lg bg-blue-600 text-white hover:bg-blue-700 transition">
        سجل كمقدم خدمة
      </a>
    </nav>
  </div>
</header>

<!-- قسم البحث الرئيسي -->
<section class="bg-gradient-to-l from-blue-600 to-blue-500 text-white py-12 px-4">
  <div class="max-w-3xl mx-auto text-center">
    <h2 class="text-2xl md:text-3xl font-bold mb-2">أقرب فني... بضغطة زر</h2>
    <p class="mb-6 text-blue-100">اعثر على مصلح السبلت، السباك، أو فني الأجهزة القريب منك فوراً</p>

    <div class="bg-white rounded-xl p-3 flex flex-col md:flex-row gap-2 shadow-lg">
      <input id="searchInput" type="text" placeholder="ابحث عن خدمة... مثال: تصليح ثلاجة"
        class="flex-1 px-4 py-3 rounded-lg text-gray-800 focus:outline-none" />
      <button id="searchBtn" class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-3 rounded-lg transition">
        بحث
      </button>
    </div>

    <div id="locationStatus" class="mt-4 text-sm text-blue-100"></div>
  </div>
</section>

<!-- قسم التصنيفات -->
<section class="max-w-6xl mx-auto px-4 py-8">
  <h3 class="text-lg font-bold mb-4">تصفح حسب التصنيف</h3>
  <div id="categoriesList" class="grid grid-cols-2 md:grid-cols-4 gap-3"></div>
</section>

<!-- خريطة تعرض مواقع مقدمي الخدمة القريبين -->
<section class="max-w-6xl mx-auto px-4 py-4">
  <div id="map" class="w-full h-72 rounded-xl shadow-md"></div>
</section>

<!-- نتائج مقدمي الخدمة القريبين -->
<section class="max-w-6xl mx-auto px-4 py-8">
  <div class="flex items-center justify-between mb-4">
    <h3 class="text-lg font-bold">الأقرب إليك</h3>
    <select id="radiusSelect" class="border rounded-lg px-3 py-2 text-sm">
      <option value="5">ضمن 5 كم</option>
      <option value="10" selected>ضمن 10 كم</option>
      <option value="20">ضمن 20 كم</option>
    </select>
  </div>

  <div id="resultsGrid" class="grid grid-cols-1 md:grid-cols-3 gap-5">
    <!-- تُملأ ديناميكياً عبر JS -->
  </div>

  <div id="emptyState" class="hidden text-center text-gray-500 py-10">
    لا يوجد مقدمو خدمة قريبون منك حالياً ضمن هذا النطاق.
  </div>
</section>

<script src="js/geolocation.js"></script>
<script src="js/app.js"></script>
</body>
</html>
